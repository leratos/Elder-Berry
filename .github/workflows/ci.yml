name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -e ".[robot,agent]"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: pip install -e ".[windows]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff (blockierende Rules)
        # E9:  Syntaxfehler – immer blockierend
        # W605: Ungültige Escape-Sequences (\n in r-Strings etc.)
        # Erweiterung auf F401/B-Regeln ist als Issue geplant, nachdem
        # die bestehenden F401-Warnings im Produktivcode bereinigt wurden.
        run: ruff check src/ tests/ --select E9,W605

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[robot,agent]"

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --desc on
