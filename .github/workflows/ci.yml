name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -e ".[robot,agent]"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: pip install -e ".[windows]"

      - name: Run tests
        run: >-
          python -m pytest tests/ -v --tb=short
          --cov=src/elder_berry --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        # Nur einmal hochladen (Linux). Windows-Run schickt sonst
        # einen zweiten Report mit identischem Stand und doppelt sich
        # in der Codecov-UI.
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff (blockierende Rules)
        # E9:   Syntaxfehler – immer blockierend
        # W605: Ungültige Escape-Sequences (\n in r-Strings etc.)
        # F401: Unused imports (bereinigt in Phase CI-Qualität)
        # B:    Bugbear-Regeln; B008 ignoriert (FastAPI File/Form/Body-Pattern)
        run: ruff check src/ tests/ --select E9,W605,F401,B --ignore B008

  typecheck:
    # Phase 76 Etappe 4: hartes Gate. Alle 14 core/-Module sind strict
    # getypt; ein Type-Fehler scheitert die Pipeline.
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install project + mypy + Stubs
        # Project-Deps werden gebraucht, damit mypy httpx/cryptography/
        # keyring etc. korrekt typisieren kann (sonst werden Returns
        # zu Any). dev-Gruppe bringt mypy + types-PyYAML + types-psutil.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type-check core/
        run: mypy src/elder_berry/core

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        # Alle sicheren optionalen Gruppen installieren, damit pip-audit
        # möglichst viele transitive Dependencies prüfen kann.
        # Gruppen mit System-Abhängigkeiten (windows, tts-neural, stt,
        # avatar, tower) werden explizit ausgelassen.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[robot,agent,matrix,remote,memory,tools,documents,nextcloud,web,harmony]"

      - name: Audit dependencies for known vulnerabilities
        # CVE-2026-3219: pip verarbeitet concatenated tar/ZIP-Archive
        # mehrdeutig. Betrifft nur Installation aus lokal praeparierten
        # Archiven; pip install von PyPI ist nicht angreifbar. Kein Fix
        # released (Fix Versions leer im Advisory). Wiederbewerten sobald
        # eine gepatchte pip-Version verfuegbar ist.
        run: pip-audit --desc on --ignore-vuln CVE-2026-3219
