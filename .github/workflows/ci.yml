name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install -e ".[robot,agent]"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: pip install -e ".[windows]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff (blockierende Rules)
        # E9:   Syntaxfehler – immer blockierend
        # W605: Ungültige Escape-Sequences (\n in r-Strings etc.)
        # F401: Unused imports (bereinigt in Phase CI-Qualität)
        # B:    Bugbear-Regeln; B008 ignoriert (FastAPI File/Form/Body-Pattern)
        run: ruff check src/ tests/ --select E9,W605,F401,B --ignore B008

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        # Alle sicheren optionalen Gruppen installieren, damit pip-audit
        # möglichst viele transitive Dependencies prüfen kann.
        # Gruppen mit System-Abhängigkeiten (windows, tts-neural, stt,
        # avatar, tower) werden explizit ausgelassen.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[robot,agent,matrix,remote,memory,tools,documents,nextcloud,web,harmony]"

      - name: Audit dependencies for known vulnerabilities
        # CVE-2026-3219: pip verarbeitet concatenated tar/ZIP-Archive
        # mehrdeutig. Betrifft nur Installation aus lokal praeparierten
        # Archiven; pip install von PyPI ist nicht angreifbar. Kein Fix
        # released (Fix Versions leer im Advisory). Wiederbewerten sobald
        # eine gepatchte pip-Version verfuegbar ist.
        run: pip-audit --desc on --ignore-vuln CVE-2026-3219
