# CodeQL — statische Code-Analyse für Sicherheitslücken.
#
# Phase 68.1: scharfgeschaltet auf jedem Push/PR auf main + weekly.
# GitHub stellt das Tooling kostenlos für Public-Repos bereit. Findings
# erscheinen unter https://github.com/leratos/Elder-Berry/security/code-scanning
#
# Sprachen: Python (Backend) + JavaScript (Frontend-Dashboard).
name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sonntag 03:17 UTC -- staffelt mit anderen Cron-Jobs.
    - cron: "17 3 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality erweitert default (security-extended) um
          # Maintainability-Checks. Lieber mehr Findings, dann triagen.
          queries: security-and-quality
          # paths-ignore u.a. fuer Adobe ExtendScript (.jsx).
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
