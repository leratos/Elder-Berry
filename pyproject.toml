[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "elder-berry"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "psutil>=5.9",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "pyautogui>=0.9",
    "PyGetWindow>=0.0.9",
    "pycaw>=20230407",
    "comtypes>=1.2",
    "pyttsx3>=2.90",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
