[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "elder-berry"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "psutil>=5.9",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "PyYAML>=6.0",
    "cryptography>=42.0",
    "anthropic>=0.40",
    "tzdata>=2024.1",
]

[project.optional-dependencies]
windows = [
    "pyautogui>=0.9",
    "PyGetWindow>=0.0.9",
    "pycaw>=20230407",
    "comtypes>=1.2",
    "pyttsx3>=2.90",
]
tts-neural = [
    "coqui-tts>=0.27",
    "sounddevice>=0.4",
    "numpy>=1.26",
]
avatar = [
    "pygame>=2.5",
]
robot = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]
agent = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.18",
    "sounddevice>=0.4",
    "numpy>=1.26",
]
matrix = [
    "matrix-nio>=0.24",
    "aiofiles>=23.0",
    "pydub>=0.25",
]
remote = [
    "mss>=9.0",
    "pyperclip>=1.9",
]
memory = [
    "chromadb>=0.5",
]
stt = [
    "faster-whisper>=1.0",
    "sounddevice>=0.4",
    "numpy>=1.26",
]
tools = [
    "google-api-python-client>=2.0",
    "google-auth-oauthlib>=1.0",
    "google-auth-httplib2>=0.2",
]
documents = [
    "pymupdf>=1.23",
]
computer-use = [
    "Pillow>=10.0",
    "mss>=9.0",
]
web = [
    "trafilatura>=1.6",
    "beautifulsoup4>=4.12",
]
nextcloud = [
    "caldav>=1.0",
    "vobject>=0.9",
]
harmony = [
    "aioharmony>=0.5.0",
]
tower = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.18",
    "coqui-tts>=0.27",
    "sounddevice>=0.4",
    "numpy>=1.26",
    "faster-whisper>=1.0",
    "pyautogui>=0.9",
    "PyGetWindow>=0.0.9",
    "pycaw>=20230407",
    "comtypes>=1.2",
    "mss>=9.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
asyncio_mode = "auto"
