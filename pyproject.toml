[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "elder-berry"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "psutil>=5.9",
    "httpx>=0.27",
    "python-dotenv>=1.0",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
windows = [
    "pyautogui>=0.9",
    "PyGetWindow>=0.0.9",
    "pycaw>=20230407",
    "comtypes>=1.2",
    "pyttsx3>=2.90",
]
tts-neural = [
    "coqui-tts>=0.27",
    "sounddevice>=0.4",
    "numpy>=1.26",
]
avatar = [
    "pygame>=2.5",
]
robot = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]
agent = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "python-multipart>=0.0.18",
    "sounddevice>=0.4",
    "numpy>=1.26",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
