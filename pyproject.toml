    "elder_berry.comms.chat_history",
    "elder_berry.comms.claude_agent",
    "elder_berry.comms.confirmation_handlers",
    "elder_berry.comms.matrix_channel",
    "elder_berry.comms.message_channel",
    "elder_berry.comms.message_handlers",
    "elder_berry.comms.pending_confirmation",
    "elder_berry.comms.reminder_scheduler",
    "elder_berry.comms.remote_commands",
    "elder_berry.comms.restart_manager",
    "elder_berry.comms.scheduler_manager",
    "elder_berry.comms.commands.advanced_commands",
    "elder_berry.comms.commands.calendar_commands",
    "elder_berry.comms.commands.camera_commands",
    "elder_berry.comms.commands.cloud_commands",
    "elder_berry.comms.commands.cmd_utils",
    "elder_berry.comms.commands.contact_commands",
    "elder_berry.comms.commands.docker_commands",
    "elder_berry.comms.commands.file_commands",
    "elder_berry.comms.commands.filing_commands",
    "elder_berry.comms.commands.git_commands",
    "elder_berry.comms.commands.harmony_commands",
    "elder_berry.comms.commands.help_sections",
    "elder_berry.comms.commands.log_commands",
    "elder_berry.comms.commands.mail_commands",
    "elder_berry.comms.commands.note_commands",
    "elder_berry.comms.commands.pdf_commands",
    "elder_berry.comms.commands.process_commands",
    "elder_berry.comms.commands.route_commands",
