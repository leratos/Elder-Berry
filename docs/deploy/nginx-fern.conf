# Beispiel-nginx-Direktiven fuer die Dashboard-Subdomain (z.B.
# fern.example.com).
#
# Eintragen je nach Reverse-Proxy / Hosting-Setup. Bei Plesk z.B.:
#   Domains -> <your-domain> -> Apache & nginx Settings ->
#   Additional nginx directives
#
# Das Dashboard ist rein statisch (PWA). Calls auf /api/robot/* und
# /api/* werden vom Saleria-Backend bedient (Reverse-Proxy auf den
# Backend-Port, hier nicht enthalten).

# Cache: statische Assets lang cachen (Service Worker uebernimmt Updates)
location ~* \.(css|js|json|png|ico)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
}
