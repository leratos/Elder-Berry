# Plesk "Additional nginx directives" für fern.last-strawberry.com
#
# Eintragen unter: Plesk → Domains → fern.last-strawberry.com
#   → Apache & nginx Settings → Additional nginx directives
#
# Das Dashboard ist rein statisch (PWA).
# API-Calls gehen direkt vom Handy an RPi5/Tower (gleiches WLAN).
# Kein Reverse Proxy nötig.

# Cache: statische Assets lang cachen (Service Worker übernimmt Updates)
location ~* \.(css|js|json|png|ico)$ {
    expires 7d;
    add_header Cache-Control "public, immutable";
}
