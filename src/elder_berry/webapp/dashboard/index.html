<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7c3aed">
    <title>Saleria Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="dashboard-header">
        <span class="header-title">Saleria</span>
        <nav class="header-nav" id="header-nav">
            <button class="nav-tab active" data-view="remote">Fernbedienung</button>
            <button class="nav-tab" data-view="settings" style="display:none;">Einstellungen</button>
            <button class="nav-tab" data-view="avatar" style="display:none;">Avatar</button>
        </nav>
        <div class="header-right">
            <button id="login-btn" class="login-btn-header" title="Login" style="display:none;">Login</button>
            <button id="logout-btn" class="logout-btn" title="Logout" style="display:none;">⏻</button>
            <span id="connection-status" class="status-dot"></span>
        </div>
    </header>

    <main id="module-container"></main>

    <!-- Phase 58: Login-Modal -->
    <div id="login-modal" class="login-modal">
        <div class="login-card">
            <h2>Dashboard-Login</h2>
            <p class="login-subtitle">
                Geschützter Bereich. Fernbedienung ist ohne Login nutzbar.
            </p>
            <form id="login-form">
                <input type="password" id="login-password"
                       placeholder="Dashboard-Passwort"
                       autocomplete="current-password" required>
                <div id="login-error" class="login-error"></div>
                <button type="submit" class="login-submit">Anmelden</button>
            </form>
        </div>
    </div>

    <script>
        // Server: tower_url relativ (Nginx-Proxy), rpi5_url bleibt LAN-IP (nur aus Heimnetz erreichbar)
        const _isServer = location.hostname.includes("last-strawberry.com");
        window.DASHBOARD_CONFIG = {
            rpi5_url:  "http://192.168.50.220:8000",
            tower_url: _isServer ? "" : "http://192.168.50.100:8090",
            views: {
                remote:   ["harmony"],
                settings: ["system", "settings"],
                avatar:   ["avatar"]
            },
            defaultView: "remote"
        };
    </script>
    <script type="module" src="modules/loader.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .catch(err => console.warn("SW registration failed:", err));
        }
    </script>
</body>
</html>
