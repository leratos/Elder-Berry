<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7c3aed">
    <!--
        Public-Release: kein hartkodierter Domain-Name im Source.
        Maintainer setzt seine Deploy-Domain entweder hier im meta-Tag,
        oder per window.ELDERBERRY_SERVER_HOST vor dem Loader-Script.
        Default "example.com" matcht im Normalfall keine echte Domain,
        d.h. der LAN-Modus ist Default. Substring-Match (location.hostname.includes).
    -->
    <meta name="elderberry-server-host" content="example.com">
    <title>Saleria Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="dashboard-header">
        <span class="header-title">Saleria</span>
        <nav class="header-nav" id="header-nav">
            <button class="nav-tab active" data-view="remote">Fernbedienung</button>
            <button class="nav-tab" data-view="settings" style="display:none;">Einstellungen</button>
            <button class="nav-tab" data-view="avatar" style="display:none;">Avatar</button>
        </nav>
        <div class="header-right">
            <button id="login-btn" class="login-btn-header" title="Login" style="display:none;">Login</button>
            <button id="logout-btn" class="logout-btn" title="Logout" style="display:none;">⏻</button>
            <span id="connection-status" class="status-dot"></span>
        </div>
    </header>

    <main id="module-container"></main>

    <!-- Phase 58: Login-Modal -->
    <div id="login-modal" class="login-modal">
        <div class="login-card">
            <h2>Dashboard-Login</h2>
            <p class="login-subtitle">
                Geschützter Bereich. Fernbedienung ist ohne Login nutzbar.
            </p>
            <form id="login-form">
                <input type="password" id="login-password"
                       placeholder="Dashboard-Passwort"
                       autocomplete="current-password" required>
                <div id="login-error" class="login-error"></div>
                <button type="submit" class="login-submit">Anmelden</button>
            </form>
        </div>
    </div>

    <script>
        // Server-Modus (Dashboard-Domain): beide URLs relativ -- die
        // Calls laufen ueber Saleria-Backend-Proxies. tower_url geht per
        // nginx-Reverse-Proxy, rpi5_url seit Phase 66 ueber Saleria's
        // /api/robot-Proxy (durch SSH-Tunnel auf 127.0.0.1:12800 zum
        // RPi5). Vorteile: kein Mixed Content, kein CORS-Problem, kein
        // LAN-Zwang fuer den Client, Robot-Token bleibt im Backend.
        // LAN-Modus (Browser direkt im Heimnetz): hardcoded LAN-IPs.
        // Server-Host-Match: meta-Tag "elderberry-server-host" oder
        // window.ELDERBERRY_SERVER_HOST (z.B. via vorgeschaltetem Inline-
        // Script setzbar). Default "example.com" trifft im Normalfall
        // keinen echten Hostnamen, also bleibt LAN-Modus aktiv.
        const _serverHostMeta = document.querySelector(
            'meta[name="elderberry-server-host"]',
        );
        const _serverHost = (
            window.ELDERBERRY_SERVER_HOST
            || (_serverHostMeta && _serverHostMeta.getAttribute("content"))
            || "example.com"
        );
        const _isServer = location.hostname.includes(_serverHost);
        window.DASHBOARD_CONFIG = {
            rpi5_url:  _isServer ? "/api/robot" : "http://192.168.50.220:8000",
            tower_url: _isServer ? "" : "http://192.168.50.100:8090",
            views: {
                remote:   ["harmony"],
                // Phase 77.5: Plugin-Inspector ist diagnose-Funktion,
                // sitzt deshalb in der Einstellungen-View.
                settings: ["system", "settings", "plugins"],
                avatar:   ["avatar"]
            },
            defaultView: "remote"
        };
    </script>
    <script type="module" src="modules/loader.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .catch(err => console.warn("SW registration failed:", err));
        }
    </script>
</body>
</html>
