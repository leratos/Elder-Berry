<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder-Berry – Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: #0f1626;
            border-right: 1px solid #2a3550;
            padding: 1.5rem 0;
        }
        .sidebar h1 {
            font-size: 1.1rem;
            color: #a8d5a2;
            padding: 0 1.5rem 1rem;
            border-bottom: 1px solid #2a3550;
            margin-bottom: 1rem;
        }
        .tab-button {
            display: block;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: #c0c0c0;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            border-left: 3px solid transparent;
            transition: background 0.15s, border-color 0.15s;
        }
        .tab-button:hover { background: #16213e; }
        .tab-button.active {
            background: #16213e;
            border-left-color: #a8d5a2;
            color: #fff;
        }
        .main {
            padding: 2rem 2.5rem;
            overflow-y: auto;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2a3550;
        }
        .header-bar h2 {
            font-size: 1.4rem;
            color: #a8d5a2;
        }
        .token-status {
            font-size: 0.85rem;
            color: #888;
        }
        .token-status.ok { color: #a8d5a2; }
        .token-status.fail { color: #e07b7b; }
        .field {
            background: #16213e;
            border-radius: 10px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 1rem;
            border: 1px solid #2a3550;
        }
        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }
        .field-label {
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
        }
        .badges { display: flex; gap: 0.4rem; }
        .badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            background: #2a3550;
            color: #c0c0c0;
            text-transform: uppercase;
        }
        .badge.high { background: #5a1f1f; color: #ffb0b0; }
        .badge.medium { background: #5a4a1f; color: #ffe0a0; }
        .badge.restart { background: #1f3a5a; color: #a0c0ff; }
        .badge.set { background: #1b4332; color: #a8d5a2; }
        .badge.unset { background: #3a2a2a; color: #d0a0a0; }
        .field-help {
            font-size: 0.82rem;
            color: #888;
            margin-bottom: 0.7rem;
        }
        .field-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .field-row input,
        .field-row select,
        .field-row textarea {
            flex: 1;
            background: #0f1626;
            border: 1px solid #2a3550;
            color: #e0e0e0;
            padding: 0.55rem 0.7rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .field-row textarea { resize: vertical; min-height: 60px; }
        .field-row button {
            background: #533483;
            border: none;
            color: #fff;
            padding: 0.55rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }
        .field-row button:hover { background: #6c4ab6; }
        .field-row button.test { background: #1f4a4a; }
        .field-row button.test:hover { background: #2a6060; }
        .field-row button:disabled { background: #333; cursor: not-allowed; }
        .field-message {
            margin-top: 0.5rem;
            font-size: 0.82rem;
            min-height: 1.1rem;
        }
        .field-message.ok { color: #a8d5a2; }
        .field-message.error { color: #e07b7b; }
        .empty-tab {
            text-align: center;
            color: #666;
            padding: 3rem;
            font-size: 0.9rem;
        }
        .token-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .token-modal.hidden { display: none; }
        .token-modal-card {
            background: #16213e;
            border-radius: 12px;
            padding: 2rem;
            max-width: 440px;
            border: 1px solid #2a3550;
        }
        .token-modal-card h3 {
            color: #a8d5a2;
            margin-bottom: 0.7rem;
        }
        .token-modal-card p {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .token-modal-card input {
            width: 100%;
            background: #0f1626;
            border: 1px solid #2a3550;
            color: #fff;
            padding: 0.7rem;
            border-radius: 6px;
            font-family: monospace;
            margin-bottom: 1rem;
        }
        .token-modal-card button {
            background: #533483;
            border: none;
            color: #fff;
            padding: 0.7rem 1.4rem;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="token-modal" id="tokenModal">
        <div class="token-modal-card">
            <h3>Settings-Token erforderlich</h3>
            <p>
                Schreibende Aktionen brauchen einen Token. Du findest ihn in
                <code>${ELDER_BERRY_HOME}/settings_token</code> oder im Server-Log
                beim Start.
            </p>
            <input id="tokenInput" type="password" placeholder="Token einfügen …">
            <button id="tokenSubmit">Speichern</button>
        </div>
    </div>

    <div class="layout">
        <nav class="sidebar">
            <h1>Saleria Settings</h1>
            <div id="tabList"></div>
        </nav>
        <main class="main">
            <div class="header-bar">
                <h2 id="currentTab">Lade …</h2>
                <span class="token-status" id="tokenStatus">Token: nicht gesetzt</span>
            </div>
            <div id="fieldContainer">
                <div class="empty-tab">Lade Konfiguration …</div>
            </div>
        </main>
    </div>

    <script>
    const TOKEN_KEY = "saleria.settings.token";
    const TOKEN_HEADER = "X-Saleria-Settings-Token";
    const TEST_SERVICES = new Set([
        "anthropic_api_key", "groq_api_key", "elevenlabs_api_key",
        "matrix_homeserver", "matrix_password", "matrix_access_token",
        "email_user", "smtp_host",
        "nextcloud_url", "stirling_pdf_url",
        "brave_api_key", "google_maps_api_key",
    ]);

    let token = localStorage.getItem(TOKEN_KEY) || "";
    let secretsByCategory = {};
    let behaviorSchema = {};
    let behaviorValues = {};
    let activeCategory = null;

    function authHeaders() {
        return token ? { [TOKEN_HEADER]: token } : {};
    }

    function setTokenStatus(state) {
        const el = document.getElementById("tokenStatus");
        if (state === "ok") {
            el.textContent = "Token: aktiv";
            el.className = "token-status ok";
        } else if (state === "fail") {
            el.textContent = "Token: ungültig";
            el.className = "token-status fail";
        } else {
            el.textContent = "Token: nicht gesetzt";
            el.className = "token-status";
        }
    }

    function showTokenModal() {
        document.getElementById("tokenModal").classList.remove("hidden");
        document.getElementById("tokenInput").focus();
    }
    function hideTokenModal() {
        document.getElementById("tokenModal").classList.add("hidden");
    }
    document.getElementById("tokenSubmit").addEventListener("click", () => {
        const v = document.getElementById("tokenInput").value.trim();
        if (!v) return;
        token = v;
        localStorage.setItem(TOKEN_KEY, token);
        hideTokenModal();
        setTokenStatus("ok");
    });

    async function loadAll() {
        try {
            const [secResp, schemaResp, valResp] = await Promise.all([
                fetch("/api/secrets/status"),
                fetch("/api/settings/schema"),
                fetch("/api/settings/values"),
            ]);
            const sec = await secResp.json();
            const schema = await schemaResp.json();
            const values = await valResp.json();

            secretsByCategory = {};
            if (sec.available && sec.categories) {
                for (const cat of sec.categories) {
                    secretsByCategory[cat.name] = cat.keys;
                }
            }
            behaviorSchema = {};
            for (const def of schema.settings || []) {
                behaviorSchema[def.key] = def;
            }
            behaviorValues = values.values || {};
            renderTabs();
        } catch (e) {
            document.getElementById("fieldContainer").innerHTML =
                `<div class="empty-tab">Fehler beim Laden: ${e}</div>`;
        }
    }

    function renderTabs() {
        const cats = Object.keys(secretsByCategory).sort();
        // Verhalten + Sicherheit aus dem Schema synthetisieren
        const behaviorCats = new Set();
        for (const def of Object.values(behaviorSchema)) {
            behaviorCats.add(def.category);
        }
        for (const c of behaviorCats) {
            if (!cats.includes(c)) cats.push(c);
        }
        const tabList = document.getElementById("tabList");
        tabList.innerHTML = "";
        for (const cat of cats) {
            const btn = document.createElement("button");
            btn.className = "tab-button";
            btn.textContent = cat;
            btn.addEventListener("click", () => selectTab(cat));
            tabList.appendChild(btn);
        }
        if (cats.length > 0) {
            const initial = window.location.hash.replace("#", "") || cats[0];
            selectTab(decodeURIComponent(initial));
        }
    }

    function selectTab(cat) {
        activeCategory = cat;
        document.getElementById("currentTab").textContent = cat;
        for (const btn of document.querySelectorAll(".tab-button")) {
            btn.classList.toggle("active", btn.textContent === cat);
        }
        renderFields();
        window.location.hash = encodeURIComponent(cat);
    }

    function renderFields() {
        const container = document.getElementById("fieldContainer");
        container.innerHTML = "";
        const secrets = secretsByCategory[activeCategory] || [];
        const behavior = Object.values(behaviorSchema).filter(
            d => d.category === activeCategory,
        );
        if (secrets.length === 0 && behavior.length === 0) {
            container.innerHTML = `<div class="empty-tab">Keine Einträge.</div>`;
            return;
        }
        for (const item of secrets) {
            container.appendChild(renderSecretField(item));
        }
        for (const def of behavior) {
            container.appendChild(renderBehaviorField(def));
        }
    }

    function makeBadges({ riskLevel, restartRequired, isSet, secret }) {
        const badges = document.createElement("div");
        badges.className = "badges";
        if (secret) {
            const b = document.createElement("span");
            b.className = "badge " + (isSet ? "set" : "unset");
            b.textContent = isSet ? "gesetzt" : "leer";
            badges.appendChild(b);
        }
        if (riskLevel === "high" || riskLevel === "medium") {
            const b = document.createElement("span");
            b.className = "badge " + riskLevel;
            b.textContent = riskLevel === "high" ? "kritisch" : "vorsicht";
            badges.appendChild(b);
        }
        if (restartRequired) {
            const b = document.createElement("span");
            b.className = "badge restart";
            b.textContent = "Restart";
            badges.appendChild(b);
        }
        return badges;
    }

    function renderSecretField(item) {
        const wrap = document.createElement("div");
        wrap.className = "field";
        const head = document.createElement("div");
        head.className = "field-header";
        const label = document.createElement("div");
        label.className = "field-label";
        label.textContent = item.label;
        head.appendChild(label);
        head.appendChild(makeBadges({
            riskLevel: item.risk_level,
            restartRequired: item.requires_restart,
            isSet: item.is_set,
            secret: item.sensitive !== false,
        }));
        wrap.appendChild(head);

        if (item.description) {
            const help = document.createElement("div");
            help.className = "field-help";
            help.textContent = item.description;
            wrap.appendChild(help);
        }

        const row = document.createElement("div");
        row.className = "field-row";
        const input = document.createElement("input");
        input.type = item.sensitive === false ? "text" : "password";
        input.placeholder = item.is_set ? "•••• (gesetzt)" : "leer";
        row.appendChild(input);

        const saveBtn = document.createElement("button");
        saveBtn.textContent = "Speichern";
        row.appendChild(saveBtn);

        if (TEST_SERVICES.has(item.key)) {
            const testBtn = document.createElement("button");
            testBtn.className = "test";
            testBtn.textContent = "Testen";
            testBtn.addEventListener("click", () => testService(item.key, msg));
            row.appendChild(testBtn);
        }
        wrap.appendChild(row);

        const msg = document.createElement("div");
        msg.className = "field-message";
        wrap.appendChild(msg);

        saveBtn.addEventListener("click", async () => {
            if (!input.value.trim()) {
                msg.textContent = "Wert darf nicht leer sein.";
                msg.className = "field-message error";
                return;
            }
            if (item.risk_level === "high") {
                if (!confirm(`'${item.label}' ist als kritisch markiert. Wirklich überschreiben?`)) {
                    return;
                }
            }
            await saveSecret(item.key, input.value, msg, input);
        });
        return wrap;
    }

    function renderBehaviorField(def) {
        const wrap = document.createElement("div");
        wrap.className = "field";
        const head = document.createElement("div");
        head.className = "field-header";
        const label = document.createElement("div");
        label.className = "field-label";
        label.textContent = def.label;
        head.appendChild(label);
        head.appendChild(makeBadges({
            riskLevel: def.riskLevel,
            restartRequired: def.restartRequired,
            isSet: true,
            secret: false,
        }));
        wrap.appendChild(head);

        if (def.helpText) {
            const help = document.createElement("div");
            help.className = "field-help";
            help.textContent = def.helpText;
            wrap.appendChild(help);
        }

        const row = document.createElement("div");
        row.className = "field-row";
        let input;
        const current = behaviorValues[def.key];
        if (def.type === "select" && def.options.length > 0) {
            input = document.createElement("select");
            for (const opt of def.options) {
                const o = document.createElement("option");
                o.value = opt.value;
                o.textContent = opt.label;
                if (String(current) === String(opt.value)) o.selected = true;
                input.appendChild(o);
            }
        } else if (def.type === "textarea") {
            input = document.createElement("textarea");
            input.value = current || "";
            if (def.placeholder) input.placeholder = def.placeholder;
        } else if (def.type === "number") {
            input = document.createElement("input");
            input.type = "number";
            input.value = current ?? "";
            if (def.minValue != null) input.min = def.minValue;
            if (def.maxValue != null) input.max = def.maxValue;
        } else {
            input = document.createElement("input");
            input.type = "text";
            input.value = current ?? "";
        }
        row.appendChild(input);

        const saveBtn = document.createElement("button");
        saveBtn.textContent = "Speichern";
        row.appendChild(saveBtn);
        wrap.appendChild(row);

        const msg = document.createElement("div");
        msg.className = "field-message";
        wrap.appendChild(msg);

        saveBtn.addEventListener("click", async () => {
            if (def.riskLevel === "high") {
                if (!confirm(`'${def.label}' ist als kritisch markiert. Wirklich überschreiben?`)) {
                    return;
                }
            }
            await saveBehavior(def.key, input.value, msg);
        });
        return wrap;
    }

    async function saveSecret(key, value, msg, input) {
        if (!token) { showTokenModal(); return; }
        msg.textContent = "Speichere …";
        msg.className = "field-message";
        try {
            const r = await fetch("/api/secrets/set", {
                method: "POST",
                headers: { "Content-Type": "application/json", ...authHeaders() },
                body: JSON.stringify({ key, value }),
            });
            const data = await r.json();
            if (r.status === 401) {
                setTokenStatus("fail");
                showTokenModal();
                return;
            }
            if (!r.ok) {
                msg.textContent = "Fehler: " + (data.error || r.status);
                msg.className = "field-message error";
                return;
            }
            setTokenStatus("ok");
            msg.textContent = data.requires_restart
                ? "Gespeichert – Neustart erforderlich." : "Gespeichert.";
            msg.className = "field-message ok";
            input.value = "";
            await loadAll();
        } catch (e) {
            msg.textContent = "Netzwerkfehler: " + e;
            msg.className = "field-message error";
        }
    }

    async function saveBehavior(key, value, msg) {
        if (!token) { showTokenModal(); return; }
        msg.textContent = "Speichere …";
        msg.className = "field-message";
        try {
            const r = await fetch("/api/settings/update", {
                method: "POST",
                headers: { "Content-Type": "application/json", ...authHeaders() },
                body: JSON.stringify({ key, value }),
            });
            const data = await r.json();
            if (r.status === 401) {
                setTokenStatus("fail");
                showTokenModal();
                return;
            }
            if (!r.ok) {
                msg.textContent = "Fehler: " + (data.error || r.status);
                msg.className = "field-message error";
                return;
            }
            setTokenStatus("ok");
            msg.textContent = data.restartRequired
                ? "Gespeichert – Neustart erforderlich." : "Gespeichert.";
            msg.className = "field-message ok";
            await loadAll();
        } catch (e) {
            msg.textContent = "Netzwerkfehler: " + e;
            msg.className = "field-message error";
        }
    }

    async function testService(key, msg) {
        msg.textContent = "Teste …";
        msg.className = "field-message";
        try {
            const r = await fetch(`/api/setup/test/${encodeURIComponent(key)}`, {
                method: "POST",
                headers: { "Content-Type": "application/json", ...authHeaders() },
                body: JSON.stringify({}),
            });
            const data = await r.json();
            if (data.success || r.ok) {
                msg.textContent = data.message || "Verbindung ok.";
                msg.className = "field-message ok";
            } else {
                msg.textContent = "Test fehlgeschlagen: " + (data.error || data.message || r.status);
                msg.className = "field-message error";
            }
        } catch (e) {
            msg.textContent = "Netzwerkfehler: " + e;
            msg.className = "field-message error";
        }
    }

    if (token) setTokenStatus("ok");
    loadAll();
    </script>
</body>
</html>
