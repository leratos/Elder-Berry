<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder-Berry – Settings</title>
    <link rel="stylesheet" href="/static/css/settings_panel.css">
</head>
<body>
    <div class="token-modal" id="tokenModal">
        <div class="token-modal-card">
            <h3>Settings-Token erforderlich</h3>
            <p>
                Schreibende Aktionen brauchen einen Token. Du findest ihn in
                <code>${ELDER_BERRY_HOME}/settings_token</code> oder im Server-Log
                beim Start.
            </p>
            <input id="tokenInput" type="password" placeholder="Token einfügen …">
            <button id="tokenSubmit">Speichern</button>
        </div>
    </div>

    <div class="layout">
        <nav class="sidebar">
            <h1>Saleria Settings</h1>
            <div id="tabList"></div>
        </nav>
        <main class="main">
            <div class="header-bar">
                <h2 id="currentTab">Lade …</h2>
                <div class="header-actions">
                    <button id="logoutAllBtn" class="logout-all-btn"
                            title="Rotiert das Session-Secret. Deine aktuelle Session bleibt aktiv, alle anderen Geräte werden abgemeldet.">
                        Alle anderen Sessions abmelden
                    </button>
                    <span class="token-status" id="tokenStatus">Token: nicht gesetzt</span>
                </div>
            </div>
            <div id="fieldContainer">
                <div class="empty-tab">Lade Konfiguration …</div>
            </div>
        </main>
    </div>

    <script src="/static/js/settings_panel.js" defer></script>
</body>
</html>
