<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elder-Berry – Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .wrap {
            max-width: 920px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #2a2a4a;
        }
        h1 { font-size: 1.4rem; color: #a8d5a2; }
        header a {
            color: #888;
            font-size: 0.85rem;
            text-decoration: none;
        }
        header a:hover { color: #a8d5a2; }

        .tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #2a2a4a;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #888;
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            font-size: 0.95rem;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .tab-btn:hover { color: #ccc; }
        .tab-btn.active {
            color: #a8d5a2;
            border-bottom-color: #a8d5a2;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .category {
            background: #16213e;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid #2a2a4a;
        }
        .category-header h2 {
            font-size: 1.05rem;
            color: #a8d5a2;
        }
        .test-btn {
            background: #533483;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .test-btn:hover { background: #6c4ab6; }
        .test-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .key-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.8rem;
            align-items: center;
            padding: 0.55rem 0;
            border-bottom: 1px solid #1f2a48;
        }
        .key-row:last-child { border-bottom: none; }
        .key-info { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
        .key-label {
            font-size: 0.92rem;
            color: #d8d8d8;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .key-desc {
            font-size: 0.75rem;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .key-desc a { color: #6c8ec5; }
        .badge {
            font-size: 0.65rem;
            padding: 0.1rem 0.45rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge.restart { background: #5a3a1a; color: #f0c070; }
        .badge.set { background: #1b4332; color: #8ed0a8; }
        .badge.unset { background: #3a1a1a; color: #d08e8e; }

        .key-value {
            font-family: ui-monospace, "Cascadia Code", monospace;
            font-size: 0.8rem;
            color: #888;
            max-width: 18ch;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .edit-btn {
            background: #2a3a5a;
            color: #ccc;
            border: none;
            border-radius: 6px;
            padding: 0.35rem 0.8rem;
            font-size: 0.78rem;
            cursor: pointer;
        }
        .edit-btn:hover { background: #3a4a7a; }

        .edit-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.5rem;
            padding: 0.4rem 0 0.6rem 0;
        }
        .edit-row input, .edit-row textarea, .edit-row select {
            background: #0f1730;
            border: 1px solid #2a3a5a;
            border-radius: 6px;
            color: #e0e0e0;
            padding: 0.5rem 0.7rem;
            font-family: inherit;
            font-size: 0.88rem;
        }
        .edit-row input:focus, .edit-row textarea:focus, .edit-row select:focus {
            outline: none;
            border-color: #a8d5a2;
        }
        .save-btn {
            background: #1b4332;
            color: #d8efd8;
            border: none;
            border-radius: 6px;
            padding: 0.45rem 1rem;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .save-btn:hover { background: #245a40; }
        .cancel-btn {
            background: #3a2a2a;
            color: #d8c0c0;
            border: none;
            border-radius: 6px;
            padding: 0.45rem 0.9rem;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .test-result {
            margin-top: 0.4rem;
            font-size: 0.8rem;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
        }
        .test-result.ok { background: #1b4332; color: #b8e8b8; }
        .test-result.err { background: #3a1a1a; color: #e8b8b8; }

        .behavior-row, .security-row {
            display: grid;
            grid-template-columns: 240px 1fr auto;
            gap: 1rem;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid #1f2a48;
        }
        .behavior-row:last-child, .security-row:last-child { border-bottom: none; }
        .behavior-label, .security-label { color: #d8d8d8; font-size: 0.92rem; }
        .behavior-help, .security-help {
            font-size: 0.72rem;
            color: #666;
            grid-column: 1 / -1;
            margin-top: -0.3rem;
        }

        .empty {
            color: #666;
            font-style: italic;
            padding: 1rem;
            text-align: center;
        }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #16213e;
            color: #e0e0e0;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border-left: 3px solid #a8d5a2;
            font-size: 0.88rem;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            max-width: 300px;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.err { border-left-color: #d08e8e; }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>Elder-Berry – Einstellungen</h1>
            <a href="/">← zurück zum Dashboard</a>
        </header>

        <div class="tabs" role="tablist">
            <button class="tab-btn active" data-tab="dienste">Dienste &amp; API-Keys</button>
            <button class="tab-btn" data-tab="verhalten">Verhalten</button>
            <button class="tab-btn" data-tab="sicherheit">Sicherheit</button>
        </div>

        <div id="tab-dienste" class="tab-panel active">
            <div id="services-root">Lade …</div>
        </div>
        <div id="tab-verhalten" class="tab-panel">
            <div id="behavior-root">Lade …</div>
        </div>
        <div id="tab-sicherheit" class="tab-panel">
            <div id="security-root">Lade …</div>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
    "use strict";

    const KEY_TEST = {
        anthropic_api_key: "anthropic",
        groq_api_key: "groq",
        brave_api_key: "brave",
        google_maps_api_key: "google_maps",
        robot_host: "rpi5",
        tower_host: "tower",
    };
    const CATEGORY_TEST = {
        "Matrix": "matrix",
        "E-Mail": "email",
        "Nextcloud": "nextcloud",
    };

    const $ = (sel, root = document) => root.querySelector(sel);
    const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    function toast(msg, kind = "ok") {
        const el = $("#toast");
        el.textContent = msg;
        el.classList.toggle("err", kind === "err");
        el.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => el.classList.remove("show"), 2800);
    }

    async function getJSON(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
        return r.json();
    }
    async function postJSON(url, body) {
        const r = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: body == null ? "{}" : JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        return { ok: r.ok, status: r.status, data };
    }

    // --- Tab-Switching + Deep-Link --------------------------------------
    function activateTab(name) {
        $$(".tab-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
        $$(".tab-panel").forEach((p) => p.classList.toggle("active", p.id === `tab-${name}`));
        if (location.hash !== `#${name}`) history.replaceState(null, "", `#${name}`);
    }
    $$(".tab-btn").forEach((b) => b.addEventListener("click", () => activateTab(b.dataset.tab)));

    // --- Tab 1: Dienste & API-Keys --------------------------------------
    async function loadServices() {
        const root = $("#services-root");
        try {
            const data = await getJSON("/api/secrets/status");
            if (!data.available) {
                root.innerHTML = '<div class="empty">SecretStore nicht verfügbar.</div>';
                return;
            }
            root.innerHTML = data.categories.map(renderCategory).join("");
            wireCategoryEvents(root);
        } catch (e) {
            root.innerHTML = `<div class="empty">Fehler: ${escapeHtml(e.message)}</div>`;
        }
    }

    function renderCategory(cat) {
        const test = CATEGORY_TEST[cat.name];
        const testBtn = test
            ? `<button class="test-btn" data-test-cat="${escapeHtml(test)}">Verbinden testen</button>`
            : "";
        return `
        <div class="category" data-category="${escapeHtml(cat.name)}">
            <div class="category-header">
                <h2>${escapeHtml(cat.name)}</h2>
                ${testBtn}
            </div>
            ${cat.keys.map(renderKeyRow).join("")}
            <div class="cat-test-result"></div>
        </div>`;
    }

    function renderKeyRow(k) {
        const isSet = !!k.is_set;
        const restart = k.requires_restart
            ? '<span class="badge restart">Restart</span>' : "";
        const stateBadge = isSet
            ? '<span class="badge set">gesetzt</span>'
            : '<span class="badge unset">leer</span>';
        const link = k.link
            ? `<a href="${escapeHtml(k.link)}" target="_blank" rel="noopener">↗</a>`
            : "";
        const desc = k.description
            ? `<div class="key-desc">${escapeHtml(k.description)} ${link}</div>` : "";
        const value = k.sensitive
            ? (isSet ? '<span class="key-value">••••••••</span>' : '<span class="key-value">—</span>')
            : '<span class="key-value">—</span>';
        const keyTest = KEY_TEST[k.key];
        const keyTestBtn = keyTest
            ? `<button class="test-btn" data-test-key="${escapeHtml(keyTest)}" data-secret-key="${escapeHtml(k.key)}">Test</button>`
            : "";
        return `
        <div class="key-row" data-key="${escapeHtml(k.key)}">
            <div class="key-info">
                <div class="key-label">${escapeHtml(k.label)} ${stateBadge} ${restart}</div>
                ${desc}
            </div>
            ${value}
            <div style="display:flex;gap:0.4rem;">
                ${keyTestBtn}
                <button class="edit-btn" data-edit="${escapeHtml(k.key)}" data-sensitive="${k.sensitive ? "1" : "0"}">Bearbeiten</button>
            </div>
        </div>
        <div class="edit-slot" data-edit-slot="${escapeHtml(k.key)}"></div>`;
    }

    function wireCategoryEvents(root) {
        $$(".edit-btn", root).forEach((btn) => btn.addEventListener("click", () => openEditor(btn)));
        $$(".test-btn[data-test-cat]", root).forEach((btn) =>
            btn.addEventListener("click", () => runServiceTest(btn.dataset.testCat, btn)));
        $$(".test-btn[data-test-key]", root).forEach((btn) =>
            btn.addEventListener("click", () => runServiceTest(btn.dataset.testKey, btn)));
    }

    function openEditor(btn) {
        const key = btn.dataset.edit;
        const sensitive = btn.dataset.sensitive === "1";
        const slot = $(`[data-edit-slot="${key}"]`);
        if (slot.dataset.open === "1") { slot.innerHTML = ""; slot.dataset.open = "0"; return; }
        slot.dataset.open = "1";
        slot.innerHTML = `
        <div class="edit-row">
            <input type="${sensitive ? "password" : "text"}"
                   placeholder="Neuer Wert für ${escapeHtml(key)}"
                   autocomplete="off">
            <button class="save-btn">Speichern</button>
            <button class="cancel-btn">Abbrechen</button>
        </div>`;
        const input = $("input", slot);
        input.focus();
        $(".save-btn", slot).addEventListener("click", () => saveSecret(key, input.value, slot));
        $(".cancel-btn", slot).addEventListener("click", () => { slot.innerHTML = ""; slot.dataset.open = "0"; });
        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") saveSecret(key, input.value, slot);
            if (e.key === "Escape") { slot.innerHTML = ""; slot.dataset.open = "0"; }
        });
    }

    async function saveSecret(key, value, slot) {
        if (!value || !value.trim()) { toast("Wert darf nicht leer sein", "err"); return; }
        const r = await postJSON("/api/secrets/set", { key, value });
        if (!r.ok) { toast(r.data.error || `Fehler ${r.status}`, "err"); return; }
        toast(`'${key}' gespeichert${r.data.requires_restart ? " (Restart nötig)" : ""}`);
        slot.innerHTML = ""; slot.dataset.open = "0";
        loadServices();
    }

    async function runServiceTest(service, btn) {
        const original = btn.textContent;
        btn.disabled = true; btn.textContent = "Teste …";
        const slot = btn.closest(".category").querySelector(".cat-test-result");
        try {
            const r = await postJSON(`/api/settings/test/${service}`, {});
            const ok = r.ok && r.data.success;
            slot.innerHTML = `<div class="test-result ${ok ? "ok" : "err"}">
                ${ok ? "✓ Verbindung OK" : "✗ " + escapeHtml(r.data.error || "Test fehlgeschlagen")}
            </div>`;
        } catch (e) {
            slot.innerHTML = `<div class="test-result err">✗ ${escapeHtml(e.message)}</div>`;
        } finally {
            btn.disabled = false; btn.textContent = original;
        }
    }

    // --- Tab 2: Verhalten ------------------------------------------------
    async function loadBehavior() {
        const root = $("#behavior-root");
        try {
            const [schema, values] = await Promise.all([
                getJSON("/api/settings/schema"),
                getJSON("/api/settings/values"),
            ]);
            root.innerHTML = `<div class="category">
                <div class="category-header"><h2>Verhalten &amp; Routing</h2></div>
                ${schema.settings.map((d) => renderBehaviorRow(d, values.values[d.key])).join("")}
            </div>`;
            $$(".behavior-input", root).forEach((el) =>
                el.addEventListener("change", () => updateBehavior(el)));
        } catch (e) {
            root.innerHTML = `<div class="empty">Fehler: ${escapeHtml(e.message)}</div>`;
        }
    }

    function renderBehaviorRow(def, value) {
        let input;
        const v = value == null ? "" : value;
        if (def.type === "select") {
            input = `<select class="behavior-input" data-key="${escapeHtml(def.key)}">
                ${(def.options || []).map((o) =>
                    `<option value="${escapeHtml(o.value)}" ${o.value === v ? "selected" : ""}>${escapeHtml(o.label)}</option>`
                ).join("")}
            </select>`;
        } else if (def.type === "number") {
            input = `<input class="behavior-input" type="number" data-key="${escapeHtml(def.key)}"
                value="${escapeHtml(v)}"
                ${def.minValue != null ? `min="${def.minValue}"` : ""}
                ${def.maxValue != null ? `max="${def.maxValue}"` : ""}>`;
        } else if (def.type === "textarea") {
            input = `<textarea class="behavior-input" rows="3" data-key="${escapeHtml(def.key)}"
                placeholder="${escapeHtml(def.placeholder || "")}">${escapeHtml(v)}</textarea>`;
        } else {
            input = `<input class="behavior-input" type="text" data-key="${escapeHtml(def.key)}"
                value="${escapeHtml(v)}">`;
        }
        const restart = def.restartRequired
            ? '<span class="badge restart">Restart</span>' : "";
        return `
        <div class="behavior-row">
            <div class="behavior-label">${escapeHtml(def.label)} ${restart}</div>
            <div>${input}</div>
            <div></div>
            ${def.helpText ? `<div class="behavior-help">${escapeHtml(def.helpText)}</div>` : ""}
        </div>`;
    }

    async function updateBehavior(el) {
        const key = el.dataset.key;
        const value = el.value;
        const r = await postJSON("/api/settings/update", { key, value });
        if (!r.ok) { toast(r.data.error || `Fehler ${r.status}`, "err"); return; }
        toast(`'${key}' gespeichert${r.data.restartRequired ? " (Restart nötig)" : ""}`);
    }

    // --- Tab 3: Sicherheit -----------------------------------------------
    async function loadSecurity() {
        const root = $("#security-root");
        try {
            const data = await getJSON("/api/settings/security");
            const senders = data.allowed_senders;
            const cors = data.cors;
            root.innerHTML = `
            <div class="category">
                <div class="category-header"><h2>Allowed Senders (Matrix)</h2></div>
                <div class="security-row">
                    <div class="security-label">Konfigurierte Sender</div>
                    <div>${senders.count} ${senders.configured ? '<span class="badge set">aktiv</span>' : '<span class="badge unset">leer</span>'}</div>
                    <div></div>
                    <div class="security-help">Verwaltung im Tab "Dienste &amp; API-Keys" → Matrix → Erlaubte Sender.</div>
                </div>
            </div>
            <div class="category">
                <div class="category-header"><h2>CORS (read-only)</h2></div>
                <div class="security-row">
                    <div class="security-label">Erlaubte Origins</div>
                    <div><code>${cors.origins.map(escapeHtml).join("<br>")}</code></div>
                    <div></div>
                </div>
                <div class="security-row">
                    <div class="security-label">Methoden</div>
                    <div>${cors.methods.join(", ")}</div>
                    <div></div>
                </div>
                <div class="security-row">
                    <div class="security-label">Credentials</div>
                    <div>${cors.allow_credentials ? "ja" : "nein"}</div>
                    <div></div>
                    <div class="security-help">${escapeHtml(cors.note || "")}</div>
                </div>
            </div>`;
        } catch (e) {
            root.innerHTML = `<div class="empty">Fehler: ${escapeHtml(e.message)}</div>`;
        }
    }

    // --- Init -----------------------------------------------------------
    const initial = (location.hash || "#dienste").replace("#", "");
    if (["dienste", "verhalten", "sicherheit"].includes(initial)) activateTab(initial);
    loadServices();
    loadBehavior();
    loadSecurity();
    </script>
</body>
</html>
